<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NemoClaw — Setting Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      color: #76b900;
    }
    .subtitle {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 32px;
    }
    .status-text {
      font-size: 14px;
      color: #c9d1d9;
      margin-bottom: 16px;
      min-height: 20px;
      text-align: center;
      max-width: 360px;
    }
    .progress-container {
      width: 360px;
      background: #161b22;
      border-radius: 8px;
      overflow: hidden;
      height: 12px;
      margin-bottom: 10px;
      border: 1px solid #30363d;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #76b900, #a4e600);
      border-radius: 8px;
      transition: width 0.3s ease;
    }
    .progress-detail {
      font-size: 12px;
      color: #8b949e;
      min-height: 18px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #30363d;
      border-top-color: #76b900;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="logo">NemoClaw</div>
  <div class="subtitle">Preparing your local AI assistant</div>
  <div class="spinner" id="spinner"></div>
  <div class="status-text" id="status-text">Initializing…</div>
  <div class="progress-container hidden" id="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-detail" id="progress-detail"></div>

  <script>
    const statusText = document.getElementById("status-text");
    const progressContainer = document.getElementById("progress-container");
    const progressBar = document.getElementById("progress-bar");
    const progressDetail = document.getElementById("progress-detail");
    const spinner = document.getElementById("spinner");

    window.nemoclaw.onStatus((data) => {
      statusText.textContent = data.message || "";
      if (data.phase === "pulling") {
        spinner.classList.add("hidden");
        progressContainer.classList.remove("hidden");
      }
    });

    window.nemoclaw.onProgress((data) => {
      if (data.percent !== undefined) {
        progressBar.style.width = data.percent + "%";
        progressDetail.textContent = formatBytes(data.completed) + " / " + formatBytes(data.total) + " (" + data.percent + "%)";
      } else if (data.status) {
        progressDetail.textContent = data.status;
      }
    });

    window.nemoclaw.onError((data) => {
      statusText.textContent = "Setup failed: " + (data.message || "Unknown error");
      spinner.classList.add("hidden");
      progressDetail.textContent = "";
    });

    function formatBytes(bytes) {
      if (bytes === 0) return "0 B";
      var k = 1024;
      var sizes = ["B", "KB", "MB", "GB"];
      var i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + " " + sizes[i];
    }
  </script>
</body>
</html>
