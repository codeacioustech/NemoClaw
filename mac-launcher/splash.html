<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NemoClaw Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #76b900, #00b4d8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 40px;
    }

    .status {
      font-size: 14px;
      color: #c9d1d9;
      margin-bottom: 16px;
      min-height: 20px;
      text-align: center;
    }

    .progress-container {
      width: 320px;
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #76b900, #00b4d8);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: #8b949e;
      min-height: 16px;
    }

    .error {
      color: #f85149;
      font-size: 13px;
      margin-top: 12px;
      max-width: 360px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="logo">NemoClaw</div>
  <div class="subtitle">Setting up your local AI environment</div>
  <div class="status" id="status">Initializing...</div>
  <div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-text" id="progress-text"></div>
  <div class="error" id="error"></div>

  <script>
    const statusEl = document.getElementById("status");
    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    const errorEl = document.getElementById("error");

    window.launcher.onStatus((msg) => {
      if (msg.error) {
        errorEl.textContent = msg.error;
        errorEl.style.display = "block";
        return;
      }
      statusEl.textContent = msg.text || "";
    });

    window.launcher.onProgress((data) => {
      if (data.total && data.total > 0) {
        const pct = Math.round((data.completed / data.total) * 100);
        progressBar.style.width = pct + "%";

        const mb = (n) => (n / (1024 * 1024)).toFixed(1);
        progressText.textContent = `${mb(data.completed)} MB / ${mb(data.total)} MB (${pct}%)`;
      } else if (data.status) {
        progressText.textContent = data.status;
      }
    });
  </script>
</body>
</html>
