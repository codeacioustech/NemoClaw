<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'" />
  <title>open-coot — AI Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- Legacy Wizard UI (Windows & Linux) -->
  <div id="app">
    <!-- Title Bar -->
    <div id="title-bar">
      <div id="title-bar-drag">
        <span id="title-bar-text">NemoClaw Installer</span>
      </div>
      <div id="title-bar-controls">
        <button id="btn-minimize" class="title-btn" aria-label="Minimize">&#x2013;</button>
        <button id="btn-maximize" class="title-btn" aria-label="Maximize">&#x25A1;</button>
        <button id="btn-close" class="title-btn title-btn-close" aria-label="Close">&#x2715;</button>
      </div>
    </div>

    <!-- Step Progress Bar -->
    <div id="step-progress">
      <div class="step-item active" data-step="0">
        <div class="step-circle">1</div>
        <span class="step-label">Welcome</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item" data-step="1">
        <div class="step-circle">2</div>
        <span class="step-label">System</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item" data-step="2">
        <div class="step-circle">3</div>
        <span class="step-label">Provider</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item" data-step="3">
        <div class="step-circle">4</div>
        <span class="step-label">Sandbox</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item" data-step="4">
        <div class="step-circle">5</div>
        <span class="step-label">Install</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item" data-step="5">
        <div class="step-circle">6</div>
        <span class="step-label">Done</span>
      </div>
    </div>

    <!-- Wizard Content -->
    <div id="wizard-content"></div>
  </div>

  <!-- open-coot Root (macOS: bootstrap → onboarding → dashboard) -->
  <div id="oc-root" style="display:none"></div>

  <!-- Router decides which UI to load -->
  <script type="module" src="./router.ts"></script>
</body>
</html>
